<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Currency Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>

<nav>
    <span class="logo" data-i18n="title">Currency Analyzer</span>
    <div class="nav-controls">
        <select id="langSwitch" class="lang-select" onchange="changeLanguage(this.value)">
            <option value="cs">CZ</option>
            <option value="en">EN</option>
        </select>
        <span class="user-info">admin</span>
    </div>
</nav>

<div class="container">

    <div class="error" id="errorBox"></div>

    <div class="card">
        <h3 data-i18n="settings">Nastavení</h3>
        <div class="row">
            <div>
                <label data-i18n="baseCurrency">Základní měna</label>
                <select id="base">
                    <option>AUD</option><option>CAD</option><option>CHF</option>
                    <option>CNY</option><option>CZK</option><option>DKK</option>
                    <option selected>EUR</option><option>GBP</option><option>HKD</option>
                    <option>HUF</option><option>ILS</option><option>JPY</option>
                    <option>MXN</option><option>NOK</option><option>NZD</option>
                    <option>PHP</option><option>PLN</option><option>RON</option>
                    <option>SEK</option><option>SGD</option><option>THB</option>
                    <option>TRY</option><option>USD</option><option>ZAR</option>
                </select>
            </div>
            <div>
                <label data-i18n="dateRange">Časové období</label>
                <div class="date-row">
                    <input type="date" id="dateFrom" value="2026-01-01">
                    <span>–</span>
                    <input type="date" id="dateTo" value="2026-02-01">
                </div>
            </div>
        </div>

        <label data-i18n="trackedCurrencies">Sledované měny</label>
        <div class="chips" id="chips"></div>

        <div style="display:flex;gap:10px;margin-top:1rem;">
            <button class="btn btn-primary" style="flex:1;" onclick="loadData()" data-i18n="loadBtn">Načíst data</button>
            <button class="btn-save" onclick="saveSettings()" data-i18n="saveBtn">Uložit nastavení</button>
        </div>
    </div>

    <div id="results">
        <div class="metrics">
            <div class="metric s">
                <div class="metric-label" data-i18n="strongest">Nejsilnější měna</div>
                <div class="metric-value" id="strongest">–</div>
                <div class="metric-sub" id="strongestRate"></div>
            </div>
            <div class="metric w">
                <div class="metric-label" data-i18n="weakest">Nejslabší měna</div>
                <div class="metric-value" id="weakest">–</div>
                <div class="metric-sub" id="weakestRate"></div>
            </div>
            <div class="metric">
                <div class="metric-label" data-i18n="average">Průměr za období</div>
                <div class="metric-value" id="average">–</div>
            </div>
        </div>

        <div class="card">
            <h3 data-i18n="tableTitle">Kurzy</h3>
            <table>
                <thead>
                <tr>
                    <th data-i18n="tableCurrency">Měna</th>
                    <th data-i18n="tableRate">Kurz vůči základní</th>
                    <th data-i18n="tableDate">Průměr za dobu</th>
                </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
